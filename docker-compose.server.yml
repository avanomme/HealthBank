# Server override — uses native MySQL instead of Docker MySQL.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up -d --build
#   make server-up
#
# The Docker MySQL is replaced with a lightweight healthcheck-only
# container so depends_on still works. The API connects to the
# host's native MySQL via host.docker.internal.

services:
  mysql:
    image: alpine:latest
    container_name: hdbtestdb
    entrypoint: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 2s
      retries: 1
    volumes: []
    ports: []
    env_file: []
    environment:
      - PLACEHOLDER=1

  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/api.prod.env
    environment:
      - DATABASE_URL=mysql://myuser:mypassword@host.docker.internal:3306/healthdatabase

  nginx:
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  db_backup:
    profiles: ["disabled"]

  db_restore:
    profiles: ["disabled"]
